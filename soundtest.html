<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sound Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8e4df; font-family: 'Outfit', -apple-system, sans-serif; color: #222; padding: 40px; }
h1 { font-size: 20px; margin-bottom: 24px; }
h2 { margin: 24px 0 12px; font-size: 16px; }
button { background: #222; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; margin: 4px; font-family: inherit; }
button:hover { background: #444; }
.section { margin-bottom: 32px; }
p { font-size: 12px; color: #888; margin-bottom: 8px; }
</style>
</head>
<body>
<h1>Piece Lock Sound Options</h1>

<script>
const actx = new (window.AudioContext || window.webkitAudioContext)();
function resume(){if(actx.state==='suspended')actx.resume();}

function tone(freq,dur,type='sine',vol=0.12){
  resume();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.value=vol;
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+dur);
}

function lockA(){
  // Soft tap — very short high click
  tone(600,0.03,'sine',0.06);
}

function lockB(){
  // Gentle low pop
  tone(250,0.08,'sine',0.07);
}

function lockC(){
  // Tiny wooden knock
  tone(400,0.04,'triangle',0.06);
  tone(200,0.05,'triangle',0.04);
}

function lockD(){
  // Soft thud — quiet and muted
  tone(120,0.1,'sine',0.05);
}

function lockE(){
  // No sound
}
</script>

<div class="section">
<p>A: Soft tap — tiny high click</p>
<button onclick="lockA()">A — Tap</button>
<p>B: Gentle low pop</p>
<button onclick="lockB()">B — Pop</button>
<p>C: Tiny wooden knock</p>
<button onclick="lockC()">C — Wood</button>
<p>D: Soft thud — very quiet</p>
<button onclick="lockD()">D — Thud</button>
<p>E: No sound</p>
<button onclick="lockE()">E — Silent</button>
</div>

</body>
</html>
